<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<div class="auth-container">
    <div class="card">
        <h2>Reset Password</h2>
        <p style="text-align:center;color:#6b7280;font-size:14px;margin-top:-10px;">Enter your email and choose a new password.</p>

        <label>Email</label>
        <input id="forgotEmail" type="email" placeholder="Your registered email">

        <label>New Password</label>
        <input id="newPassword" type="password" placeholder="Min 6 characters">

        <label>Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat new password">

        <button onclick="forgotPassword()" style="margin-top:14px;">Reset Password</button>

        <p style="text-align:center;margin-top:14px;font-size:14px;">
            <a href="login.html">← Back to Login</a>
        </p>
    </div>
</div>
</body>
</html>
