<!DOCTYPE html>
<html>
<head>
    <title>Report Card</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>

<div class="container">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
        <button class="hamburger no-print" onclick="toggleSidebar()">☰</button>

        <div class="topbar no-print">
            <h1 style="margin:0;">Report Card</h1>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <select id="studentSelect" style="width:auto;" onchange="render()"></select>
                <select id="termSelect" style="width:auto;" onchange="render()">
                    <option>Term 1</option><option>Term 2</option><option>Term 3</option>
                </select>
                <button onclick="window.print()" style="width:auto;padding:10px 20px;"><i class="fa-solid fa-print"></i> Print</button>
            </div>
        </div>

        <div id="reportCard"></div>
    </div>
</div>

<script>
const me = initPage(null, "report-card.html");
const students = getStudents();
const EXAM_SUBJECTS = ["Mathematics", "English", "Science", "History", "Geography", "Kiswahili"];

const sel = document.getElementById("studentSelect");
const showStudents = me.role === "parent" ? [students[getLinkedStudentIndex(me.email)]] : students;
showStudents.forEach((s, i) => {
    const opt = document.createElement("option");
    opt.value = me.role === "parent" ? getLinkedStudentIndex(me.email) : i;
    opt.textContent = s.name;
    sel.appendChild(opt);
});

function render() {
    const si   = parseInt(sel.value);
    const term = document.getElementById("termSelect").value;
    const s    = students[si];
    const att  = getAttendanceStats(si);
    const examData = JSON.parse(localStorage.getItem("examResults_" + term)) || {};
    const settings = JSON.parse(localStorage.getItem("schoolSettings")) || { name: "SchoolSys Academy" };

    const scores = EXAM_SUBJECTS.map(sub => {
        const v = examData[si] && examData[si][sub] !== undefined ? Number(examData[si][sub]) : null;
        return { sub, score: v };
    });

    const valid = scores.filter(x => x.score !== null);
    const avg   = valid.length ? Math.round(valid.reduce((a,x) => a + x.score, 0) / valid.length) : null;
    const gpa   = avg !== null ? calcGPA([avg]) : null;
    const pass  = avg !== null ? avg >= 50 : null;

    const remarks = avg === null ? "No data" : avg >= 80 ? "Excellent performance. Keep it up!" : avg >= 65 ? "Good performance. Room for improvement." : avg >= 50 ? "Satisfactory. More effort needed." : "Below average. Needs significant improvement.";

    document.getElementById("reportCard").innerHTML = `
    <div class="report-card">
        <div class="report-card-header">
            <h1>${esc(settings.name || "SchoolSys Academy")}</h1>
            <p>Student Report Card — ${esc(term)}</p>
            <p>${settings.email || ""} ${settings.phone ? "| " + settings.phone : ""}</p>
        </div>

        <div style="display:flex;gap:30px;flex-wrap:wrap;margin-bottom:20px;">
            <div class="report-section" style="flex:1;min-width:200px;">
                <h3>Student Information</h3>
                <table style="min-width:unset;">
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Name</td><td><strong>${esc(s.name)}</strong></td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Grade</td><td>${esc(s.grade)}</td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Term</td><td>${esc(term)}</td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Attendance</td><td>${att.total > 0 ? att.pct + "%" : "—"}</td></tr>
                </table>
            </div>
            <div class="report-section" style="flex:1;min-width:200px;">
                <h3>Summary</h3>
                <table style="min-width:unset;">
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Average</td><td><strong>${avg !== null ? avg : "—"}</strong></td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">GPA</td><td>${gpa || "—"}</td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Result</td><td>${pass === null ? "—" : `<strong style="color:${pass?'#16a34a':'#A82810'}">${pass?'PASS':'FAIL'}</strong>`}</td></tr>
                    <tr><td style="color:#6b7280;padding:6px 12px 6px 0;">Grade</td><td>${avg !== null ? letterGrade(avg) : "—"}</td></tr>
                </table>
            </div>
        </div>

        <div class="report-section">
            <h3>Subject Results</h3>
            <table>
                <thead><tr><th>Subject</th><th>Score</th><th>Grade</th><th>Remarks</th></tr></thead>
                <tbody>${scores.map(x => {
                    const r = x.score === null ? "—" : x.score >= 80 ? "Excellent" : x.score >= 65 ? "Good" : x.score >= 50 ? "Average" : "Poor";
                    return `<tr>
                        <td>${esc(x.sub)}</td>
                        <td>${x.score !== null ? x.score : "—"}</td>
                        <td>${x.score !== null ? letterGrade(x.score) : "—"}</td>
                        <td>${r}</td>
                    </tr>`;
                }).join("")}</tbody>
                <tfoot><tr><th>Average</th><th>${avg !== null ? avg : "—"}</th><th>${avg !== null ? letterGrade(avg) : "—"}</th><th></th></tr></tfoot>
            </table>
        </div>

        <div class="report-section">
            <h3>Class Teacher's Remarks</h3>
            <p style="padding:12px;background:#fff3ec;border-radius:6px;border-left:3px solid #F67B50;">${remarks}</p>
        </div>

        <div style="display:flex;justify-content:space-between;margin-top:40px;padding-top:20px;border-top:1px solid #fde8d8;">
            <div style="text-align:center;">
                <div style="border-top:1px solid #374151;width:160px;padding-top:6px;font-size:13px;color:#6b7280;">Class Teacher's Signature</div>
            </div>
            <div style="text-align:center;">
                <div style="border-top:1px solid #374151;width:160px;padding-top:6px;font-size:13px;color:#6b7280;">Principal's Signature</div>
            </div>
            <div style="text-align:center;">
                <div style="border-top:1px solid #374151;width:160px;padding-top:6px;font-size:13px;color:#6b7280;">Parent's Signature</div>
            </div>
        </div>
    </div>`;
}

render();
</script>
</body>
</html>
