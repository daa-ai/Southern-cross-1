<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>

<div class="container">
    <!-- Sidebar rendered by JS based on role -->
    <div class="sidebar" id="sidebar"></div>

    <div class="main">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>My Profile</h1>

        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;">

            <div class="form-panel" style="max-width:420px;flex:1;">
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
                    <div class="avatar" id="avatarInitial"></div>
                    <div>
                        <div style="font-weight:700;font-size:18px;" id="profileDisplayName"></div>
                        <div style="color:#6b7280;font-size:13px;" id="profileDisplayRole"></div>
                    </div>
                </div>

                <label>Full Name</label>
                <input id="profileName" type="text" placeholder="Full Name">

                <label>Email</label>
                <input id="profileEmail" type="email" placeholder="Email">

                <label>New Password <span style="font-weight:400;color:#9ca3af;">(leave blank to keep current)</span></label>
                <input id="profilePassword" type="password" placeholder="New password">

                <label>Confirm New Password</label>
                <input id="profileConfirm" type="password" placeholder="Confirm new password">

                <button onclick="updateProfile()" style="margin-top:16px;">Save Changes</button>
            </div>

        </div>
    </div>
</div>

<script>
const user = initPage(null, "profile.html");
document.getElementById("profileName").value = user.name;
document.getElementById("profileEmail").value = user.email;
document.getElementById("profileDisplayName").textContent = user.name;
document.getElementById("profileDisplayRole").textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
document.getElementById("avatarInitial").textContent = user.name.charAt(0).toUpperCase();
</script>
</body>
</html>
