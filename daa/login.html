<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<div class="auth-container">
    <div class="card">
        <h2>Login</h2>
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="Enter your email">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password">
        <button onclick="login()" style="margin-top:14px;">Login</button>
        <p style="text-align:center;font-size:14px;margin-top:12px;">
            <a href="forgot-password.html">Forgot password?</a>
        </p>
        <p style="text-align:center;font-size:14px;">
            No account? <a href="register.html">Register</a>
        </p>
    </div>
</div>
</body>
</html>
