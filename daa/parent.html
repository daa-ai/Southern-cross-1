<!DOCTYPE html>
<html>
<head>
    <title>Parent Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<div class="container">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar">
            <h1 style="margin:0;">Welcome, <span id="welcomeUser"></span></h1>
        </div>

        <div class="cards" id="statCards"></div>

        <canvas id="gradesChart" style="margin-bottom:30px;max-height:300px;"></canvas>

        <div class="topbar"><h2 style="margin:0;">Child's Grades</h2></div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Subject</th><th>Score</th><th>Grade</th></tr></thead>
                <tbody id="gradesTable"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
checkAuth("parent");
const user = JSON.parse(localStorage.getItem("currentUser"));
document.getElementById("welcomeUser").textContent = user.name;
initPage("parent", "parent.html");

// Parent sees child at index 0 by default
const CHILD_INDEX = 0;
const subjects = ["Mathematics", "English", "Science"];
const scores = subjects.map(sub => {
    const saved = JSON.parse(localStorage.getItem("grades_" + sub)) || {};
    return saved[CHILD_INDEX] !== undefined && saved[CHILD_INDEX] !== "" ? Number(saved[CHILD_INDEX]) : null;
});
const validScores = scores.filter(s => s !== null);
const avg = validScores.length > 0 ? Math.round(validScores.reduce((a,b) => a+b, 0) / validScores.length) : null;
const stats = getAttendanceStats(CHILD_INDEX);

document.getElementById("statCards").innerHTML = `
    <div class="card-box"><i class="fa-solid fa-calendar-check"></i><h3>Attendance</h3><p>${stats.total > 0 ? stats.pct + "%" : "—"}</p></div>
    <div class="card-box"><i class="fa-solid fa-star"></i><h3>Avg Grade</h3><p>${avg !== null ? letterGrade(avg) : "—"}</p></div>
    <div class="card-box"><i class="fa-solid fa-triangle-exclamation"></i><h3>Absent Days</h3><p>${stats.Absent}</p></div>`;

document.getElementById("gradesTable").innerHTML = subjects.map((sub, i) =>
    `<tr><td>${esc(sub)}</td><td>${scores[i] !== null ? scores[i] : "—"}</td><td>${scores[i] !== null ? letterGrade(scores[i]) : "—"}</td></tr>`
).join("");

new Chart(document.getElementById("gradesChart"), {
    type: "radar",
    data: {
        labels: subjects,
        datasets: [{ label: "Scores", data: scores.map(s => s || 0), backgroundColor: "rgba(246,123,80,0.2)", borderColor: "#F67B50" }]
    }
});
</script>
</body>
</html>
